server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          # Disabled: auto-generated /<service-id>/** routes would bypass the
          # JwtAuthenticationFilter. All services are reached via the explicit
          # /api/** routes below instead.
          enabled: false
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/users/register
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: JwtAuthenticationFilter
        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/api/wallets/**
          filters:
            - name: JwtAuthenticationFilter
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: JwtAuthenticationFilter
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - name: JwtAuthenticationFilter
        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/api/agent/**
          filters:
            - name: JwtAuthenticationFilter

ewallet:
  security:
    jwt:
      secret: ${EWALLET_JWT_SECRET:U3RlcmxpbmctRVdhbGxldC1TdXBlci1TZWNyZXQtS2V5LU11c3QtQmUtTG9uZy1FbnVnaC0yNTYtYml0cw==}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO

server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:file:./data/paymentdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

ewallet:
  internal:
    secret: ${EWALLET_INTERNAL_SECRET:ewallet-internal-svc-shared-secret-change-me}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_xxxxxxxxxxxx}
  key-secret: ${RAZORPAY_KEY_SECRET:changeme}
  currency: INR

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
